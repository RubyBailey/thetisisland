backend:
  name: github
  repo: JohnShillington/thetisisland
  branch: main
  base_url: https://thetisisland-auth.john-shillington.workers.dev

media_folder: public/images
public_folder: /images

collections:
  # ──────────────────────────────────────────────
  # Organizations (Community & Groups page cards)
  # ──────────────────────────────────────────────
  - name: organizations
    label: Community & Groups
    label_singular: Organization
    folder: src/content/organizations
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: name, label: Name, widget: string }
      - { name: tagline, label: Tagline, widget: string, hint: "One-line description shown on the card." }
      - { name: description, label: Description, widget: text, required: false, hint: "Optional longer description for future use." }
      - name: url
        label: Website URL
        widget: string
        required: false
        hint: "Full URL (https://example.com) or internal path (/about). Leave blank if none."
        pattern:
          - '^(https?://[^\s]+|/[^\s]*)$'
          - "Must be a full URL (https://…) or an internal path (/…)"
      - name: category
        label: Category
        widget: select
        options:
          - { label: Organization, value: organization }
          - { label: Club / Volunteer Group, value: club }
          - { label: Social Service, value: social-service }
          - { label: Social & Exercise Group, value: social-exercise }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        required: false
        hint: "Select all that apply."
        options:
          - { label: Official / Government, value: official }
          - { label: Emergency-Related, value: emergency-related }
          - { label: Recreation, value: recreation }
          - { label: Youth & Education, value: youth }
          - { label: Marine & Boating, value: marine }
          - { label: Arts & Culture, value: arts }
          - { label: Health & Wellness, value: health }
      - { name: featured, label: Featured, widget: boolean, default: false, hint: "Featured organizations appear first in their category." }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."

  # ──────────────────────────────────────────────
  # Services (Our Services page)
  # ──────────────────────────────────────────────
  - name: services
    label: Our Services
    label_singular: Service
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: name, label: Name, widget: string }
      - { name: description, label: Short Description, widget: string, hint: "Brief summary shown in listings." }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."
      - { name: body, label: Full Description, widget: markdown, hint: "Detailed description with hours, location, etc." }

  # ──────────────────────────────────────────────
  # Singleton Pages
  # ──────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: false
    delete: false
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    sortable_fields:
      fields: [nav_order, title]
      default:
        field: nav_order
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Meta Description, widget: string, required: false, hint: "SEO description shown in search results." }
      - { name: nav_order, label: Nav Order, widget: number, value_type: int, hint: "Display order in the CMS sidebar and website navigation. Lower numbers appear first." }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."
      - { name: body, label: Content, widget: markdown, hint: "Page content in Markdown. Use ## for section headings." }

  # ──────────────────────────────────────────────
  # Home Cards (navigation cards on home page)
  # ──────────────────────────────────────────────
  - name: home-cards
    label: Home Cards
    files:
      - name: cards
        label: Home Page Cards
        file: src/data/home-cards.yaml
        fields:
          - name: cards
            label: Cards
            widget: list
            label_singular: Card
            hint: "Navigation cards shown on the home page. Each card links to a section of the site."
            fields:
              - { name: title, label: Title, widget: string, hint: "Short title shown on the card." }
              - { name: href, label: Link, widget: string, hint: "URL path (e.g. /ferry, /services)." }
              - { name: text, label: Description, widget: string, hint: "Brief description shown below the title." }

  # ──────────────────────────────────────────────
  # Ferry Schedule (single data file)
  # ──────────────────────────────────────────────
  - name: ferry-schedule
    label: Ferry Schedule
    files:
      - name: schedule
        label: Ferry Schedule
        file: src/data/ferry-schedule.yaml
        fields:
          - { name: effective_date, label: Effective Date, widget: string, hint: "e.g. January 2, 2025" }
          - name: saturday_thursday
            label: "Sunday–Thursday Sailings"
            widget: list
            label_singular: Sailing
            hint: "Each sailing is one trip. Sailings alternate direction (east then west). Leave a time blank if the ferry skips that terminal."
            fields:
              - { name: thetis, label: Thetis, widget: string, required: false, hint: "Time at Thetis (e.g. 5:45 AM), or leave blank if skipped." }
              - { name: penelakut, label: Penelakut, widget: string, required: false, hint: "Time at Penelakut, or leave blank if skipped." }
              - { name: chemainus, label: Chemainus, widget: string, required: false, hint: "Time at Chemainus, or leave blank if skipped." }
              - name: flag
                label: Flag
                widget: select
                required: false
                options:
                  - { label: "(none)", value: "" }
                  - { label: Probable DC, value: probable-dc }
                  - { label: Possible DC, value: possible-dc }
                  - { label: Arrival Only, value: arrival-only }
          - name: friday
            label: "Friday Sailings"
            widget: list
            label_singular: Sailing
            hint: "Each sailing is one trip. Sailings alternate direction (east then west). Leave a time blank if the ferry skips that terminal."
            fields:
              - { name: thetis, label: Thetis, widget: string, required: false, hint: "Time at Thetis (e.g. 5:45 AM), or leave blank if skipped." }
              - { name: penelakut, label: Penelakut, widget: string, required: false, hint: "Time at Penelakut, or leave blank if skipped." }
              - { name: chemainus, label: Chemainus, widget: string, required: false, hint: "Time at Chemainus, or leave blank if skipped." }
              - name: flag
                label: Flag
                widget: select
                required: false
                options:
                  - { label: "(none)", value: "" }
                  - { label: Probable DC, value: probable-dc }
                  - { label: Possible DC, value: possible-dc }
                  - { label: Arrival Only, value: arrival-only }
          - name: legend
            label: Legend
            widget: object
            fields:
              - { name: probable-dc, label: Probable DC Description, widget: string }
              - { name: possible-dc, label: Possible DC Description, widget: string }
              - { name: arrival-only, label: Arrival Only Description, widget: string }
          - name: notes
            label: Notes
            widget: list
            field: { name: note, label: Note, widget: string }
